services:
  nginx:
    image: nginx:1.30-alpine
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend_app:/app
    container_name: nginx
    ports:
      - "8000:80"
    networks:
      - frontend_app
      - backend_app
    depends_on:
      - php

  php:
    build:
      context: ./
      dockerfile: ./docker/backend/php/dev.Dockerfile
    networks:
      - backend_app
    container_name: php
    ports:
      - "5173:5173"
    volumes:
      - ./backend_app:/app/
      - ./docker/backend/php/dev.custom.ini:/usr/local/etc/php/conf.d/dev.custom.ini
      - ./docker/backend/php/xdebug.ini:/usr/local/etc/php/conf.d/docker-php-ext-xdebug.ini
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: time_track
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_app
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d time_track" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  backend_app:
    driver: bridge
  frontend_app:
    driver: bridge

volumes:
  postgres_data: